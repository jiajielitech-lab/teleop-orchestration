<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteDay Planner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="planner-panel" aria-label="Natural language planner">
        <div class="brand-row">
          <div>
            <p class="eyebrow">RouteDay</p>
            <h1>Turn errands into a timed route.</h1>
          </div>
          <button class="icon-button" id="sampleButton" aria-label="Load sample plan" title="Load sample plan">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <label class="input-label" for="planInput">What do you want to do?</label>
        <textarea
          id="planInput"
          spellcheck="true"
          rows="7"
          placeholder="Example: Tomorrow around 11 I need to drop off a package at UPS, get Chick-fil-A for lunch, maybe stop by Target, and be home before 3:30."
        ></textarea>

        <div class="controls-grid">
          <label>
            Start
            <input id="startTime" type="time" value="11:00" />
          </label>
          <label>
            From
            <input id="startPlace" type="text" value="Home" />
          </label>
          <label>
            Return by
            <input id="returnBy" type="time" value="15:30" />
          </label>
        </div>

        <div class="option-row" aria-label="Plan preferences">
          <button class="segmented active" data-mode="easy">Easiest</button>
          <button class="segmented" data-mode="fast">Fastest</button>
          <button class="segmented" data-mode="meal">Meal-aware</button>
        </div>

        <button class="primary-button" id="planButton">
          <span aria-hidden="true">✓</span>
          Build plan
        </button>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="summary-strip">
          <div>
            <span class="metric-label">Stops</span>
            <strong id="stopCount">0</strong>
          </div>
          <div>
            <span class="metric-label">Commute</span>
            <strong id="commuteTime">0m</strong>
          </div>
          <div>
            <span class="metric-label">Finish</span>
            <strong id="finishTime">--:--</strong>
          </div>
        </div>

        <div class="route-map" aria-label="Route preview">
          <div class="road-line"></div>
          <div class="map-point home-point">Home</div>
          <div class="map-point stop-point one">1</div>
          <div class="map-point stop-point two">2</div>
          <div class="map-point stop-point three">3</div>
          <div class="map-card" id="routeStatus">Waiting for your day plan</div>
        </div>

        <div class="tabs" role="tablist" aria-label="Plan views">
          <button class="tab active" data-view="itinerary">Itinerary</button>
          <button class="tab" data-view="intent">Intent</button>
          <button class="tab" data-view="providers">Providers</button>
        </div>

        <div id="itineraryView" class="view active">
          <ol class="timeline" id="timeline"></ol>
        </div>

        <div id="intentView" class="view">
          <pre id="intentOutput"></pre>
        </div>

        <div id="providersView" class="view">
          <div class="provider-grid" id="providerGrid"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
